<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İnternet Bağlantısı Yok - Balkon Dergisi</title>
  <style>
    :root {
      --bg: #f9f9f9;
      --text: #1f2937;
      --text-muted: #6b7280;
      --primary: #dc2626;
      --primary-hover: #b91c1c;
      --border: #e5e7eb;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }
    .card {
      background: white;
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      max-width: 480px;
      width: 100%;
      transform: translateY(0);
      transition: transform 0.3s ease;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.025em;
    }
    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 24px 0;
    }
    .motto {
      font-style: italic;
      color: var(--primary);
      font-size: 13px;
      margin-top: 16px;
      display: block;
    }
    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(220, 38, 38, 0.2), 0 2px 4px -1px rgba(220, 38, 38, 0.1);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    button:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🪴</div>
    <h1>Balkonunuz Çevrimdışı</h1>
    <p>
      Görünüşe göre internet bağlantınız kesildi. Merak etmeyin, daha önce okuduğunuz dergiler ve önbelleğe alınmış sayfalar hâlâ kullanılabilir olabilir.
    </p>
    <button onclick="window.location.reload()">
      Tekrar Dene
    </button>
    <span class="motto">“Şu içimizin de balkonu olsaydı, çıkıp arada nefes alsaydık.”</span>
  </div>
</body>
</html>
